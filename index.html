<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GT Crime Map - Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Mantengo tus estilos originales (abreviados para el ejemplo, pero usa los tuyos) */
        :root {
            --bg: #0a0b0e; --surface: #111318; --surface2: #181c24;
            --border: #232733; --border2: #2e3445; --text: #e8eaf0;
            --text2: #8b93aa; --text3: #4e566b; --accent: #4f6ef7;
            --accent2: #3d59e0; --danger: #e84040; --success: #2dd882;
            --warn: #f5a623;
        }
        /* ... (Copia aquí todo tu bloque <style> original completo) ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        nav { height: 56px; background: rgba(10,11,14,0.92); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 12px; z-index: 1000; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 17px; font-weight: 800; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), #7c3aed); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .nav-tabs { display: flex; gap: 4px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 4px; }
        .nav-tab { padding: 6px 16px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--text2); }
        .nav-tab.active { background: var(--surface); color: var(--text); }
        .btn-login { padding: 8px 18px; background: var(--accent); color: #fff; border: none; border-radius: 9px; font-weight: 700; cursor: pointer; }
        #map { flex: 1; z-index: 1; }
        .main { flex: 1; display: flex; overflow: hidden; position: relative; }
        /* Reutiliza todos tus estilos de modales, sidebar y chips aquí */
    </style>
</head>
<body>

<nav>
    <div class="logo"><div class="logo-icon">🛡</div> GT Crime Map</div>
    <div class="nav-tabs">
        <button class="nav-tab active" id="tab-map" onclick="switchView('map')">🗺 Mapa</button>
        <button class="nav-tab" id="tab-dash" onclick="switchView('dashboard')">📊 Dashboard</button>
    </div>
    <div style="flex:1"></div>
    <button class="btn-login" id="btn-login-nav" onclick="openAuthModal()">Iniciar Sesión</button>
    <div id="user-badge" style="display:none; align-items:center; gap:8px;">
        <div class="user-avatar" id="user-initials">?</div>
        <span id="user-name-display"></span>
        <button onclick="logout()" style="background:none; border:none; color:var(--text3); cursor:pointer;">✕</button>
    </div>
</nav>

<div class="main">
    <div id="map-view" style="flex:1; display:flex;">
        <div id="map"></div>
    </div>
</div>

<script>
// 1. CONFIGURACIÓN SUPABASE
const SUPABASE_URL = 'https://oxwillxgejzjyxknuxle.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im94d2lsbHhnZWp6anl4a251eGxlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTI0MDAsImV4cCI6MjA4OTg2ODQwMH0.ockUn86S6ndey6FvlFwr767mNFQBfNGtUleXCIEvsNg';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 2. ESTADO GLOBAL
let currentUser = null;
let incidents = [];
let map, heatLayer, markersLayer;
let activeFilter = 'all';
let pickingLocation = false;
let pendingLocation = null;
let selectedCat = null;

const CAT_COLORS = { Robo: '#f5a623', Asalto: '#e84040', Sospechoso: '#facc15', Vandalismo: '#c084fc', Drogas: '#4ade80', Otro: '#94a3b8' };
const CAT_ICONS = { Robo:'💰', Asalto:'⚠️', Sospechoso:'👁', Vandalismo:'🖌', Drogas:'💊', Otro:'🔍' };

// 3. CARGA DE DATOS DESDE SUPABASE
async function loadIncidents() {
    const { data, error } = await _supabase
        .from('incidents')
        .select('*')
        .order('created_at', { ascending: false });

    if (error) {
        console.error("Error al cargar:", error.message);
    } else {
        incidents = data;
        renderMapData();
        renderSidebarList();
    }
}

// 4. AUTENTICACIÓN REAL
async function doRegister() {
    const name = document.getElementById('reg-name').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const pass = document.getElementById('reg-pass').value;

    const { data, error } = await _supabase.auth.signUp({
        email, password: pass,
        options: { data: { full_name: name } }
    });

    if (error) return showToast('❌ ' + error.message, '#e84040');
    showToast('✓ Revisa tu correo para confirmar', '#2dd882');
    closeAuthModal();
}

async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass = document.getElementById('login-pass').value;

    const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pass });

    if (error) return showToast('❌ ' + error.message, '#e84040');
    
    currentUser = {
        id: data.user.id,
        name: data.user.user_metadata.full_name || data.user.email
    };
    updateUserUI();
    closeAuthModal();
    showToast('✓ Bienvenido', '#2dd882');
}

// 5. ENVÍO DE REPORTES
async function submitReport() {
    if (!currentUser) return showToast('⚠️ Inicia sesión primero', '#f5a623');
    if (!pendingLocation || !selectedCat) return showToast('❌ Falta ubicación o categoría', '#e84040');
    
    const desc = document.getElementById('report-desc').value.trim();

    const { error } = await _supabase.from('incidents').insert([{
        lat: pendingLocation.lat,
        lng: pendingLocation.lng,
        category: selectedCat,
        description: desc,
        user_id: currentUser.id,
        user_name: currentUser.name // Asegúrate de tener esta columna en Supabase
    }]);

    if (error) {
        showToast('❌ Error: ' + error.message, '#e84040');
    } else {
        showToast('✓ Reporte enviado', '#2dd882');
        closeReportModal();
        loadIncidents();
    }
}

// 6. INICIALIZACIÓN
document.addEventListener('DOMContentLoaded', async () => {
    initMap();
    
    // Verificar si hay sesión activa al recargar
    const { data: { user } } = await _supabase.auth.getUser();
    if (user) {
        currentUser = {
            id: user.id,
            name: user.user_metadata.full_name || user.email
        };
        updateUserUI();
    }
    
    await loadIncidents();
});

// ... (Copia aquí el resto de tus funciones: initMap, renderMapData, showToast, etc.) ...
</script>
</body>
</html>
